name: CI / Compilar WinOpt

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4
    - name: Compilar
      shell: pwsh
      run: ./Compile.ps1
    - name: Publicar artefacto
      uses: actions/upload-artifact@v4
      with:
        name: WinOpt
        path: WinOpt.ps1
